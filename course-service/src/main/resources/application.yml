server:
  port: 8081

spring:
  application:
    name: course-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/course_db}
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

logging:
  level:
    com.scalable.course: INFO
